services:
  backend:
    build: .
    image: task-manager-backend
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
     - mysql
     - redis

  mysql:
   image: mysql:8.4
   volumes:
      - mysql-data:/var/lib/mysql
   environment:
     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
     MYSQL_DATABASE: ${MYSQL_DATABASE}
     MYSQL_USER: ${MYSQL_USER}
     MYSQL_PASSWORD: ${MYSQL_PASSWORD}
   ports:
      - "3307:3306"

  redis:
    image: redis:8
    ports:
      - "6379:6379"  
volumes:
  mysql-data: